{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Recipe{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <button id="toggleSidebar" class="toggle-btn">
                ☰
            </button>

            <div class="logo">
                🍳 <span class="logo-text">Smart Recipe</span>
            </div>

            <nav>
                <ul>

                    <li>
                        <a href="#">
                            <span class="icon">🏠</span>
                            <span class="menu-text">Dashboard</span>
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            <span class="icon">📖</span>
                            <span class="menu-text">Todas las recetas</span>
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            <span class="icon">❤️</span>
                            <span class="menu-text">Favoritas</span>
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            <span class="icon">➕</span>
                            <span class="menu-text">Nueva receta</span>
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            <span class="icon">🥕</span>
                            <span class="menu-text">Buscar por ingredientes</span>
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            <span class="icon">✨</span>
                            <span class="menu-text">Generar receta IA</span>
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            <span class="icon">👨‍🍳</span>
                            <span class="menu-text">Asistente culinario</span>
                        </a>
                    </li>

                </ul>
            </nav>

        </aside>

        <!-- Contenido -->
        <main class="main-content">

            <header class="topbar">

                <h4>Smart Recipe</h4>

                <div>
                    Bienvenida 👋
                </div>

            </header>

            <section class="content">

                {% block content %}
                {% endblock %}

            </section>

        </main>

    </div>

    <script
         src="{% static 'js/app.js' %}">
    </script>

</body>

</html>
